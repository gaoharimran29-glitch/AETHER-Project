# =============================================================================
# AETHER — Docker Compose
# National Space Hackathon 2026, IIT Delhi
#
# Usage:
#   docker compose up --build          # build and start
#   docker compose up --build -d       # detached (background)
#   docker compose down                # stop and remove containers
#   docker compose logs -f             # follow logs
#
# After starting, the system is available at:
#   API:       http://localhost:8000/api/status
#   Dashboard: http://localhost:8000/
# =============================================================================

services:
  aether:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aether
    ports:
      - "8000:8000"       # PS §8 — grading scripts connect here
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # Redis runs in the same container on 127.0.0.1 — be explicit so
      # it never accidentally resolves to a Docker DNS name.
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "8", "http://localhost:8000/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    # Resource limits — keep image lean and predictable
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '0.5'