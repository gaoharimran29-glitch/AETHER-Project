version: "3.9"

services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aether_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save "" --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - aether_net

  # ── AETHER Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aether_backend
    restart: unless-stopped
    ports:
      - "8000:8000"        
    environment:
      - REDIS_HOST=redis    # connects to Redis container by service name
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --log-level info
      --reload
    volumes:
      - .:/app            
    networks:
      - aether_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  redis_data:
    driver: local

networks:
  aether_net:
    driver: bridge